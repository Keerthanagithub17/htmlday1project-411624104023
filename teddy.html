<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Walking Teddy Registration Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* Walking teddy */
    .teddy-walk {
      position: absolute;
      top: 20px;
      left: -150px;
      width: 100px;
      z-index: 10;
      animation: walkAcross 10s linear infinite;
    }

    @keyframes walkAcross {
      0% {
        left: -150px;
      }
      100% {
        left: 110%;
      }
    }

    .form-container {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
      width: 320px;
      text-align: center;
      animation: slideUp 1s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 15px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #f27a54;
      box-shadow: 0 0 5px #f27a5488;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #f27a54;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e05b34;
    }

    .success-message {
      display: none;
      color: green;
      margin-top: 15px;
      animation: fadeIn 1s forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <!-- Walking Teddy Bear GIF -->
  <img src="https://media.giphy.com/media/U3qYN8S0j3bpK/giphy.gif" alt="Walking Teddy" class="teddy-walk">

  <div class="form-container">
    <h2>Register</h2>
    <form id="regForm">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <div class="success-message" id="successMsg">🎉 You're registered, teddy friend!</div>
  </div>

  <script>
    document.getElementById("regForm").addEventListener("submit", function(e) {
      e.preventDefault();
      document.getElementById("successMsg").style.display = "block";
    });
  </script>

</body>
</html>
